name: Deploy to IONOS via SFTP
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          lftp -u "${{ secrets.SFTP_USERNAME }}","${{ secrets.SFTP_PASSWORD }}" \
            sftp://${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_PORT }} <<EOF
          set sftp:auto-confirm yes
          set net:timeout 30
          mirror -R --delete --no-perms \
            --exclude .git/ \
            --exclude .github/ \
            ./ /clickandbuilds/StudiMOVE879797/studimove_app_test
          quit
          EOF
